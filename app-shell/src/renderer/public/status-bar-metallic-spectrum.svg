<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 120" preserveAspectRatio="none">
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9b174d"/>
      <stop offset="0.12" stop-color="#e83f7a"/>
      <stop offset="0.24" stop-color="#f08a2d"/>
      <stop offset="0.34" stop-color="#f4d64d"/>
      <stop offset="0.48" stop-color="#66b96f"/>
      <stop offset="0.61" stop-color="#4bb5cf"/>
      <stop offset="0.74" stop-color="#3268e4"/>
      <stop offset="0.88" stop-color="#8c4df0"/>
      <stop offset="1" stop-color="#c33fb0"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="0.10" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="0.24" stop-color="#05050a" stop-opacity="0.18"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.70" stop-color="#05050a" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="0.03" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.92" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.82"/>
    </linearGradient>
    <filter id="brushed" x="-4%" y="-40%" width="108%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.64" numOctaves="2" seed="42" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <radialGradient id="shine" cx="50%" cy="0%" r="62%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="0.34" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="120" fill="#07070d"/>
  <rect y="14" width="1600" height="88" rx="0" fill="url(#spectrum)" filter="url(#brushed)"/>
  <rect y="14" width="1600" height="88" fill="url(#metal)"/>
  <rect y="14" width="1600" height="88" fill="url(#shine)"/>
  <rect y="12" width="1600" height="92" fill="url(#edge)"/>
</svg>
