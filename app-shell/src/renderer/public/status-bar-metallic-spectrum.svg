<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 120" preserveAspectRatio="none">
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9b174d"/>
      <stop offset="0.12" stop-color="#e83f7a"/>
      <stop offset="0.24" stop-color="#f08a2d"/>
      <stop offset="0.34" stop-color="#f4d64d"/>
      <stop offset="0.48" stop-color="#66b96f"/>
      <stop offset="0.61" stop-color="#4bb5cf"/>
      <stop offset="0.74" stop-color="#3268e4"/>
      <stop offset="0.88" stop-color="#8c4df0"/>
      <stop offset="1" stop-color="#c33fb0"/>
    </linearGradient>
    <!-- Glossy light model: bright crown, specular falloff, mid shadow, a secondary
         reflection band lower down, then a deep base. No hard edge lines. -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="0.05" stop-color="#ffffff" stop-opacity="0.50"/>
      <stop offset="0.14" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="0.34" stop-color="#05050a" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#05050a" stop-opacity="0.20"/>
      <stop offset="0.74" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.86" stop-color="#000000" stop-opacity="0.22"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0.52"/>
    </linearGradient>
    <!-- Tight specular hotspot for the wet-glass pop -->
    <radialGradient id="shine" cx="50%" cy="-8%" r="72%">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.60"/>
      <stop offset="0.30" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Thin polished glaze sweeping across the crown -->
    <linearGradient id="glaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.4"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="brushed" x="-4%" y="-40%" width="108%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.64" numOctaves="2" seed="42" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.14"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
  </defs>
  <!-- Full-bleed spectrum: fills the whole viewBox, so no dark frame anywhere -->
  <rect width="1600" height="120" fill="url(#spectrum)" filter="url(#brushed)"/>
  <rect width="1600" height="120" fill="url(#gloss)"/>
  <rect width="1600" height="120" fill="url(#shine)"/>
  <rect width="1600" height="30"  fill="url(#glaze)"/>
</svg>
